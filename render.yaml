services:
  - type: web
    name: exam-portal-backend
    env: node
    buildCommand: "cd server && npm install --include=dev && npm run build"
    startCommand: "cd server && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXAM_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false

  - type: web
    name: exam-portal-frontend
    env: static
    buildCommand: "cd client && npm install && npm run build"
    staticPublishPath: "./client/dist"
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
